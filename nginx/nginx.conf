# Nginx configuration for Tetris Multiplayer Server
# WebSocket proxy setup

upstream websocket_backend {
    # Point to Node.js WebSocket server
    server localhost:8080;
    # For multiple backend servers:
    # server backend1.example.com:8080;
    # server backend2.example.com:8080;
    # with load balancing: least_conn;
}

server {
    listen 80;
    server_name _;

    # Increase buffer sizes for large messages
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # WebSocket proxy configuration
    location /ws {
        proxy_pass http://websocket_backend;
        
        # Required headers for WebSocket upgrade
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Preserve host and protocol information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for long-lived connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        
        # Disable proxy buffering for WebSocket
        proxy_buffering off;
    }

    # Health check endpoint (optional)
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Serve static files if needed (Flutter web app, etc.)
    location / {
        # Uncomment to serve Flutter web app
        # root /var/www/flutter_app;
        # try_files $uri $uri/ /index.html;
        
        # For now, just proxy to backend
        proxy_pass http://websocket_backend;
    }
}

